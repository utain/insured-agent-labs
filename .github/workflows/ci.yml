name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      # curl is required by the utoipa-swagger-ui build script (Swagger UI assets).
      - name: Ensure curl
        run: curl --version >/dev/null
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  web:
    name: Web (check + lint + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      # The vitest `client` project runs in a real browser (Playwright provider).
      - name: Install Chromium for browser unit tests
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm check
      - run: pnpm lint
      - run: pnpm test:unit -- --run
      - run: pnpm build

  e2e:
    name: Blackbox e2e (API + UI vs. compose stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Build images and bring up the full stack (web :5173, backend :3000).
      - name: Build & start the stack
        run: docker compose up --build -d

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable

      - name: Install e2e deps + Chromium
        working-directory: e2e
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium

      - name: Run blackbox suite
        working-directory: e2e
        env:
          API_BASE_URL: http://localhost:3000
          WEB_BASE_URL: http://localhost:5173
        run: pnpm test

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      - name: Stop the stack
        if: always()
        run: docker compose down -v
