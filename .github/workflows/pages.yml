name: Deploy slides to Pages

on:
  push:
    branches: [main]
    paths:
      - "slides/**"
      - "scripts/build-slides-index.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build slides index
        run: node scripts/build-slides-index.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides

      - id: deployment
        uses: actions/deploy-pages@v4
