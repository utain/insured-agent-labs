apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: insureagentlabs
type: Opaque
stringData:
  # Demo value — override before any non-local use.
  ADMIN_SECRET: dev-admin-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: insureagentlabs
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: insureagentlabs
spec:
  replicas: 1 # in-memory store: scale-out would NOT share state; keep at 1.
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      containers:
        - name: backend
          image: insureagentlabs-backend:latest
          imagePullPolicy: IfNotPresent # load locally built image (kind/minikube)
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: RUST_LOG
              value: info
            - name: CORS_ORIGIN
              value: http://localhost:5173
            - name: ADMIN_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: ADMIN_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: insureagentlabs
  labels:
    app.kubernetes.io/name: backend
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
