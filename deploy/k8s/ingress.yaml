# Routes the public host to the web SSR service. The app serves both the UI and
# the JSON API (under /api, Swagger at /api-docs) from the same origin, so QA
# trainees reach Swagger/curl at the same host.
#
# Requires an ingress controller (e.g. ingress-nginx). On kind/minikube,
# add `insureagentlabs.localtest.me` (resolves to 127.0.0.1) or edit /etc/hosts.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insureagentlabs
  namespace: insureagentlabs
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - host: insureagentlabs.localtest.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
