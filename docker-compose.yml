# InsureAgentLabs — single SvelteKit app (full-stack, in-memory store).
#
#   docker compose up --build        # build + run the app
#   docker compose down              # stop
#
# Service URL on the host:
#   web → http://localhost:5173   (UI, API under /api, Swagger at /api-docs)
#
# State is in-memory and resets on restart or via POST /api/admin/reset.

services:
  web:
    build:
      context: ./web
    image: ghcr.io/utain/insureagentlabs-web:latest
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      # adapter-node validates form POST origins (CSRF). Must match the
      # browser-facing URL below.
      ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
    ports:
      - "${WEB_PORT:-5173}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped
